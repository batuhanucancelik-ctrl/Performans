<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batuhan Uçançelik - İnteraktif Analiz</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; }
        .main-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 1200px; margin: auto; }
        
        .container { width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* Dashboard Bölümü */
        .dashboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 20px; background: #2c3e50; padding: 20px; border-radius: 15px; color: white; }
        
        .control-box { display: flex; flex-direction: column; align-items: center; background: #34495e; padding: 10px; border-radius: 12px; min-width: 100px; }
        .control-btn { background: #3498db; border: none; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 1.2em; transition: 0.2s; }
        .control-btn:active { transform: scale(0.9); background: #2980b9; }
        .current-num { font-size: 2.5em; font-weight: bold; margin: 5px 0; }
        
        .result-box { display: flex; gap: 30px; align-items: center; }
        .res-item { text-align: center; }
        .res-val { font-size: 2.5em; font-weight: bold; display: block; }
        .res-label { font-size: 0.8em; text-transform: uppercase; opacity: 0.8; }
        .text-green { color: #2ecc71; }
        .text-red { color: #e74c3c; }

        /* Grafik Alanı */
        .chart-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .chart-container { position: relative; height: 350px; min-width: 800px; }

        @media (max-width: 600px) {
            .result-box { gap: 15px; }
            .current-num, .res-val { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <h2 style="text-align:center; color:#2c3e50;">📊 Deneme Veri Paneli</h2>
        <h3 style="text-align:center; color:#3498db;">Batuhan Uçançelik</h3>

        <div class="dashboard">
            <div class="control-box">
                <button class="control-btn" onclick="changeDeneme(1)">▲</button>
                <div class="current-num" id="denemeNo">1</div>
                <button class="control-btn" onclick="changeDeneme(-1)">▼</button>
                <div class="res-label">DENEME</div>
            </div>

            <div class="result-box">
                <div class="res-item">
                    <span class="res-val text-green" id="dogruSayisi">6</span>
                    <span class="res-label">DOĞRU</span>
                </div>
                <div class="res-item">
                    <span class="res-val text-red" id="yanlisSayisi">0</span>
                    <span class="res-label">YANLIŞ</span>
                </div>
            </div>
        </div>

        <div class="chart-wrapper">
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const dogrular = [
        6, 6, 6, 5, 5, 6, 6, 5, 6, 4, 
        5, 6, 5, 5, 5, 4, 4, 5, 5, 5, 
        5, 6, 5, 6, 5, 4, 3, 4, 4, 4, 
        3, 4, 5, 5, 5, 6, 4, 6, 5, 3
    ];
    const yanlislar = dogrular.map(d => 6 - d);
    const labels = Array.from({length: 40}, (_, i) => i + 1);

    let currentIndex = 0;

    const ctx = document.getElementById('mainChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Doğru',
                    data: dogrular,
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    borderWidth: 3,
                    pointRadius: 6,
                    pointBackgroundColor: (ctx) => ctx.dataIndex === currentIndex ? '#f1c40f' : '#2ecc71', // Seçili noktayı sarı yapar
                    tension: 0.3,
                    fill: true
                }
            ]
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            scales: {
                x: { ticks: { autoSkip: false } },
                y: { beginAtZero: true, max: 7 }
            }
        }
    });

    function updateDisplay() {
        document.getElementById('denemeNo').innerText = currentIndex + 1;
        document.getElementById('dogruSayisi').innerText = dogrular[currentIndex];
        document.getElementById('yanlisSayisi').innerText = yanlislar[currentIndex];
        myChart.update();
    }

    function changeDeneme(step) {
        currentIndex += step;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= dogrular.length) currentIndex = dogrular.length - 1;
        updateDisplay();
    }
</script>

</body>
</html>
