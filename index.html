<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batuhan Uçançelik - Performans Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            max-width: 1300px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        /* Sol Kontrol Paneli */
        .side-panel {
            flex: 0 0 250px;
            background: #2c3e50;
            color: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .nav-btn {
            background: #3498db;
            border: none;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-btn:hover { background: #2980b9; transform: scale(1.1); }
        
        .display-box { text-align: center; margin: 10px 0; }
        .num-large { font-size: 60px; font-weight: bold; line-height: 1; display: block; }
        .label-small { font-size: 14px; color: #bdc3c7; text-transform: uppercase; letter-spacing: 2px; }

        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 100%; 
            margin-top: 20px;
            border-top: 1px solid #455a64;
            padding-top: 20px;
        }
        .stat-card { text-align: center; }
        .stat-val { font-size: 32px; font-weight: bold; display: block; }
        .val-dogru { color: #2ecc71; }
        .val-yanlis { color: #e74c3c; }

        /* Grafik Alanı */
        .chart-area { flex: 1; min-width: 0; }
        .chart-wrapper { width: 100%; overflow-x: auto; }
        .chart-container { position: relative; height: 450px; min-width: 900px; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .side-panel { flex: none; width: 100%; box-sizing: border-box; }
            .chart-container { height: 350px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="side-panel">
        <h3 style="margin:0; color:#3498db; font-size:16px;">BATUHAN UÇANÇELİK</h3>
        
        <button class="nav-btn" onclick="updateStep(1)">▲</button>
        <div class="display-box">
            <span class="num-large" id="lblDeneme">1</span>
            <span class="label-small">DENEME</span>
        </div>
        <button class="nav-btn" onclick="updateStep(-1)">▼</button>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="res-label label-small">DOĞRU</span>
                <span class="stat-val val-dogru" id="lblDogru">6</span>
            </div>
            <div class="stat-card">
                <span class="res-label label-small">YANLIŞ</span>
                <span class="stat-val val-yanlis" id="lblYanlis">0</span>
            </div>
        </div>
    </div>

    <div class="chart-area">
        <h2 style="text-align: center; color: #2c3e50; margin-top: 0;">Performans Grafiği</h2>
        <div class="chart-wrapper">
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const dogrular = [
        6, 6, 6, 5, 5, 6, 6, 5, 6, 4, 
        5, 6, 5, 5, 5, 4, 4, 5, 5, 5, 
        5, 6, 5, 6, 5, 4, 3, 4, 4, 4, 
        3, 4, 5, 5, 5, 6, 4, 6, 5, 3
    ];
    const yanlislar = dogrular.map(d => 6 - d);
    const labels = Array.from({length: 40}, (_, i) => i + 1);
    
    let activeIdx = 0;

    const ctx = document.getElementById('performanceChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Doğru Sayısı',
                    data: dogrular,
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    borderWidth: 3,
                    pointRadius: (context) => context.dataIndex === activeIdx ? 10 : 5,
                    pointBackgroundColor: (context) => context.dataIndex === activeIdx ? '#f1c40f' : '#2ecc71',
                    pointBorderWidth: (context) => context.dataIndex === activeIdx ? 4 : 2,
                    pointBorderColor: '#fff',
                    tension: 0.4,
                    fill: true,
                    clip: false
                },
                {
                    label: 'Yanlış Sayısı',
                    data: yanlislar,
                    borderColor: '#e74c3c',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0, // Yanlışları sadece çizgi olarak gösterelim ki karışmasın
                    tension: 0.4,
                    fill: false
                }
            ]
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            scales: {
                x: { ticks: { autoSkip: false, font: {size: 10} } },
                y: { beginAtZero: true, max: 7, ticks: { stepSize: 1 } }
            },
            plugins: {
                legend: { display: true },
                tooltip: { mode: 'index', intersect: false }
            }
        }
    });

    function updateStep(val) {
        activeIdx += val;
        if (activeIdx < 0) activeIdx = 0;
        if (activeIdx >= dogrular.length) activeIdx = dogrular.length - 1;
        
        // Etiketleri Güncelle
        document.getElementById('lblDeneme').innerText = activeIdx + 1;
        document.getElementById('lblDogru').innerText = dogrular[activeIdx];
        document.getElementById('lblYanlis').innerText = yanlislar[activeIdx];
        
        chart.update(); // Grafikteki noktayı güncelle
    }
</script>

</body>
</html>
