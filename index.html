<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batuhan Uçançelik - Performans Analizi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f4f8; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center;
        }
        .container { 
            width: 100%; 
            max-width: 1200px; 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }
        h2, h3 { text-align: center; color: #2c3e50; margin: 5px 0; }
        h3 { color: #3498db; font-weight: normal; font-size: 1.1em; }
        
        /* Mobil için yatay kaydırma alanı */
        .chart-wrapper {
            width: 100%;
            overflow-x: auto; /* Mobilde sağa kaydırma sağlar */
            -webkit-overflow-scrolling: touch;
            margin-top: 20px;
        }
        
        .chart-container {
            position: relative;
            height: 400px;
            min-width: 800px; /* Mobilde sıkışmaması için minimum genişlik */
        }

        .footer-note { 
            text-align: center; 
            color: #95a5a6; 
            font-size: 0.75em; 
            margin-top: 15px; 
            padding-bottom: 10px;
        }

        /* Mobil cihazlarda başlıkları küçült */
        @media (max-width: 600px) {
            h2 { font-size: 1.2em; }
            h3 { font-size: 0.9em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 40 Deneme Performans Takibi</h2>
    <h3>Batuhan Uçançelik</h3>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
    
    <div class="footer-note">📲 Mobilde grafiği sağa kaydırarak tüm denemeleri görebilirsiniz.</div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    
    const dogrular = [
        6, 6, 6, 5, 5, 6, 6, 5, 6, 4, 
        5, 6, 5, 5, 5, 4, 4, 5, 5, 5, 
        5, 6, 5, 6, 5, 4, 3, 4, 4, 4, 
        3, 4, 5, 5, 5, 6, 4, 6, 5, 3,
        4, 4
    ].slice(0, 40);

    const yanlislar = dogrular.map(d => 6 - d);
    const labels = Array.from({length: 40}, (_, i) => i + 1);

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Doğru',
                    data: dogrular,
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    borderWidth: 2.5,
                    pointRadius: 4,
                    tension: 0.3,
                    fill: true
                },
                {
                    label: 'Yanlış',
                    data: yanlislar,
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.05)',
                    borderWidth: 2,
                    borderDash: [3, 3],
                    pointRadius: 4,
                    tension: 0.3,
                    fill: true
                }
            ]
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            scales: {
                x: {
                    ticks: {
                        autoSkip: false,
                        font: { size: 11, weight: 'bold' }
                    },
                    grid: { display: false }
                },
                y: {
                    beginAtZero: true,
                    max: 7,
                    ticks: {
                        stepSize: 1,
                        callback: function(value) { if (value <= 6) return value; }
                    }
                }
            },
            plugins: {
                legend: { position: 'top', labels: { boxWidth: 12, padding: 15 } },
                tooltip: { 
                    intersect: false, 
                    mode: 'index',
                    padding: 10,
                    bodySpacing: 5
                }
            }
        }
    });
</script>

</body>
</html>
